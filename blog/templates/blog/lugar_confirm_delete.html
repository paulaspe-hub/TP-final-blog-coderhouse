{% extends "base.html" %}
{% block title %}Eliminar lugar{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="card-title">Eliminar lugar</h1>
        <p>¿Seguro que querés eliminar <strong>{{ object.nombre }}</strong>? Se eliminarán también sus posts asociados.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'lugar_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
